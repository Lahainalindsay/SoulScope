name: PR Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        shell: bash
        run: set -o pipefail; npm run lint 2>&1 | tee lint-output.txt

      - name: Production build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee build-output.txt

      - name: Tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee test-output.txt

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: |
            frontend/lint-output.txt
            frontend/build-output.txt
            frontend/test-output.txt
