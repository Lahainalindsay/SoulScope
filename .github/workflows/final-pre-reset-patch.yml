name: Final pre-reset patch

on:
  push:
    branches:
      - codex/soulscope-v2-clean-schema

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'Apply final pre-reset SQL patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/soulscope-v2-clean-schema
          fetch-depth: 0

      - name: Patch authoritative reset SQL
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('supabase/manual/soulscope_v2_reset_and_rebuild.sql')
          sql = path.read_text()

          sql = sql.replace(
              'drop function if exists public.set_scan_reflection_preference(uuid, uuid, text, text, text);',
              'drop function if exists public.set_scan_reflection_preference(uuid, uuid, text, text, text);\n'
              'drop function if exists public.set_scan_reflection_preference(uuid, text);',
          )
          sql = sql.replace("    'user_feedback',\n", '')
          sql = sql.replace(
              'create function public.set_scan_reflection_preference(\n'
              '  p_scan_id uuid,\n'
              '  p_user_id uuid,\n'
              '  p_selected_style text,\n'
              '  p_selected_title text,\n'
              '  p_selected_summary text\n'
              ')',
              'create function public.set_scan_reflection_preference(\n'
              '  p_scan_id uuid,\n'
              '  p_selected_style text\n'
              ')',
          )
          sql = sql.replace(
              "  if authenticated_user is null\n     or p_user_id is distinct from authenticated_user then\n",
              "  if authenticated_user is null then\n",
          )
          sql = sql.replace(
              '\n  -- Caller-provided text is accepted for API compatibility but canonical stored\n'
              '  -- content always comes from the owned reflection variant.\n'
              '  perform p_selected_title;\n'
              '  perform p_selected_summary;\n',
              '',
          )
          sql = sql.replace(
              'revoke all on function public.set_scan_reflection_preference(uuid, uuid, text, text, text) from public;\n'
              'revoke all on function public.set_scan_reflection_preference(uuid, uuid, text, text, text) from anon;\n'
              'grant execute on function public.set_scan_reflection_preference(uuid, uuid, text, text, text) to authenticated;',
              'revoke all on function public.set_scan_reflection_preference(uuid, text) from public;\n'
              'revoke all on function public.set_scan_reflection_preference(uuid, text) from anon;\n'
              'grant execute on function public.set_scan_reflection_preference(uuid, text) to authenticated;',
          )

          required = [
              'create function public.set_scan_reflection_preference(\n  p_scan_id uuid,\n  p_selected_style text\n)',
              'grant execute on function public.set_scan_reflection_preference(uuid, text) to authenticated;',
          ]
          for item in required:
              if item not in sql:
                  raise SystemExit(f'Missing required SQL after patch: {item}')
          forbidden = ['p_user_id', 'p_selected_title', 'p_selected_summary']
          for item in forbidden:
              if item in sql:
                  raise SystemExit(f'Stale RPC argument remains: {item}')

          path.write_text(sql)
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/manual/soulscope_v2_reset_and_rebuild.sql
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Apply final pre-reset SQL patch"
          git push origin HEAD:codex/soulscope-v2-clean-schema
